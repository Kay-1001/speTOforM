function QuizScreen({student,unit,isReview,questions,initialPos,initialHistory,onFinish,onExit,voice}){
  const [pos,setPos]=useState(initialPos||0);
  const [sel,setSel]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const [retryCorrect,setRetryCorrect]=useState(false); // 再挑戦で正解した状態
  const [retrying,setRetrying]=useState(false);
  const [history,setHistory]=useState(initialHistory||[]);
  const [popup,setPopup]=useState(null);
  const q=questions[pos];
  const isCorrect=confirmed&&sel===q.a;
  const isFirstAttemptCorrect=isCorrect&&!retrying;

  // Save progress after each confirmed answer (skip teacher mode and review mode).
  // pos is zero-based and must equal the number of answered questions.
  // Using pos+1 here caused the resume point to advance once more after pressing "Next",
  // so students could resume from one unanswered question too far ahead.
  useEffect(()=>{
    if(!student.teacher&&!isReview&&history.length>0&&history.length<questions.length){
      STORE.set(student.id,student.name,unit,{
        history,
        pos:history.length, // next unanswered question index
        completed:false,
        ts:Date.now()
      });
    }
  },[history,student,unit,isReview,questions.length]);

  const confirm=useCallback((letter)=>{
    if(retrying){
      // 再挑戦中：history には追加せず、retryCorrect を立てるだけ
      setSel(letter);setConfirmed(true);setPopup(null);
      if(letter===q.a)setRetryCorrect(true);
      else setRetryCorrect(false);
    } else {
      setSel(letter);setConfirmed(true);setPopup(null);
      setHistory(h=>[...h,{n:q.n,correct:letter===q.a,tag:q.tag,word:q.w,unit}]);
    }
    // 自動音声再生：正解語を入れた完成文を読み上げる（毎回ユニークIDで発火）
    const fullSentence=q.q.replace("-------",q.w);
    voice.speak(fullSentence,`auto-q${q.n}-${Date.now()}`);
  },[q,unit,retrying,voice]);

  const next=useCallback(()=>{
    voice.cancel(); // 自動音声を止めてから次へ
    if(pos+1>=questions.length){
      // 完了：保存をクリア（教師・復習モード以外）
      if(!student.teacher&&!isReview){
        STORE.set(student.id,student.name,unit,{history,pos:questions.length,completed:true,ts:Date.now()});
      }
      onFinish(history);
    }
    else{setPos(p=>p+1);setSel(null);setConfirmed(false);setRetrying(false);setRetryCorrect(false);setPopup(null);}
  },[pos,questions.length,history,onFinish,student,unit,isReview,voice]);

  const retry=useCallback(()=>{voice.cancel();setConfirmed(false);setSel(null);setRetrying(true);setRetryCorrect(false);},[voice]);

  const exitToUnits=useCallback(async()=>{
    voice.cancel();
    if(!student.teacher&&!isReview){
      const nextIndex=Math.min(history.length,questions.length);
      if(nextIndex>0&&nextIndex<questions.length){
        await STORE.set(student.id,student.name,unit,{
          history,
          pos:nextIndex,
          completed:false,
          ts:Date.now()
        });
      }
      else if(nextIndex>=questions.length){
        await STORE.set(student.id,student.name,unit,{history,pos:questions.length,completed:true,ts:Date.now()});
      }
    }
    onExit();
  },[history,student,unit,isReview,questions.length,voice,onExit]);

  const pct=Math.round(((pos+1)/questions.length)*100);
  const canMoveNext=!isReview||isCorrect;

  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,color:"#444",marginBottom:6,gap:6,flexWrap:"wrap"}},
      React.createElement("span",{style:{fontWeight:700}},isReview?"[復習] ":"",pos+1," / ",questions.length," — Unit ",unit),
      React.createElement(VoiceBar,{voice,qText:q.q,qN:q.n})
    ),
    React.createElement("div",{className:"progress"},React.createElement("div",{className:"progress-bar",style:{width:pct+"%"}})),
    React.createElement("button",{className:"btn-secondary",onClick:exitToUnits,style:{marginBottom:10}},
      isReview?"Unit選択へ戻る":"中断してUnit選択へ戻る（続き保存）"
    ),
    React.createElement("div",{className:"card"},
      React.createElement("p",{style:{fontSize:12,color:"#555",marginBottom:8,fontWeight:600}},"語彙: ",q.vocab),
      React.createElement(TokenQ,{q:q.q,vocab:q.w,vocabPair:q.vocab,popup,setPopup})
    ),
    React.createElement("div",{className:"grid-2",style:{marginBottom:10}},
      q.cs.map(([l,t])=>{
        let cls="choice-btn";
        if(confirmed){
          if(l===q.a)cls+=" choice-correct";
          else if(l===sel)cls+=" choice-wrong";
        } else if(sel===l)cls+=" choice-selected";
        return React.createElement("button",{key:l,className:cls,disabled:confirmed,
          onClick:()=>{if(!confirmed)setSel(l);},
          onDoubleClick:()=>{if(!confirmed&&sel===l)confirm(l);}},
          React.createElement("span",{style:{fontWeight:600,flexShrink:0,minWidth:24}},"(",l,")"),
          React.createElement("span",{style:{flex:1}},t)
        );
      })
    ),
    !confirmed&&sel&&React.createElement("button",{className:"btn-primary",style:{marginBottom:8},onClick:()=>confirm(sel)},"決定"),
    confirmed&&React.createElement("div",null,
      // 再挑戦で正解した時の専用バナー
      retrying&&retryCorrect&&React.createElement("div",{className:"retry-correct-banner"},
        React.createElement("div",{className:"main"},"✓ 再挑戦で正解！"),
        React.createElement("div",{className:"sub"},"（最初の判定が記録されているため、得点には反映されません）")
      ),
      // 通常のフィードバックカード（再挑戦正解時はスキップ）
      !(retrying&&retryCorrect)&&React.createElement("div",{className:"card",style:{background:isCorrect?"#EAF3DE":"#FCEBEB",borderColor:isCorrect?"#3B6D11":"#A32D2D",borderWidth:"1.5px",marginBottom:8}},
        React.createElement("p",{style:{fontWeight:700,fontSize:15,color:isCorrect?"#2a4f0a":"#7a1f1f",marginBottom:8}},
          isCorrect?"✓ 正解！":"✗ 不正解。正解は ("+q.a+") "+q.cs.find(c=>c[0]===q.a)[1]
        ),
        React.createElement("p",{style:{fontSize:13,color:"#222",lineHeight:1.75,marginBottom:4,fontWeight:500}},q.ok),
        !isCorrect&&q.ng[sel]&&React.createElement("p",{style:{fontSize:12,color:"#7a1f1f",marginTop:6,paddingTop:6,borderTop:"1px solid #d8a0a0",fontWeight:500,lineHeight:1.7}},
          "("+sel+"): "+q.ng[sel]
        )
      ),
      // 再挑戦正解時は解説カードを別カードで小さく出す
      retrying&&retryCorrect&&React.createElement("div",{className:"card",style:{marginBottom:8,background:"#fafafa"}},
        React.createElement("p",{style:{fontSize:13,color:"#222",lineHeight:1.75,fontWeight:500}},q.ok)
      ),
      React.createElement("div",{style:{display:"flex",gap:8}},
        !isCorrect&&(!retrying||isReview)&&React.createElement("button",{className:"btn-warning",onClick:retry},"もう一度"),
        canMoveNext&&React.createElement("button",{className:"btn-secondary",onClick:next},pos+1<questions.length?"次へ →":"終了")
      )
    ),
    student.teacher&&!confirmed&&React.createElement("div",{style:{marginTop:8,padding:"8px 12px",background:"#FEF9E7",border:"1.5px solid #854F0B",borderRadius:8,fontSize:13,color:"#5a3206",fontWeight:600}},
      "TEACHER: 正解 (",q.a,") ",q.cs.find(c=>c[0]===q.a)?.[1]||""
    ),
    React.createElement("p",{className:"footer"},"© 2026 Kaoruko Takechi · All rights reserved.")
  );
}

function App(){
  const [screen,setScreen]=useState("start");
  const [student,setStudent]=useState(null);
  const [unit,setUnit]=useState(1);
  const [history,setHistory]=useState([]);
  const [resumeData,setResumeData]=useState(null);
  const [reviewQs,setReviewQs]=useState([]);
  const [reviewDone,setReviewDone]=useState(false);
  const voice=useVoice();

  useEffect(()=>{window.speechSynthesis?.getVoices();},[]);

  const handleStart=useCallback((s)=>{
    setStudent(s);setUnit(s.unit);setHistory([]);setReviewQs([]);setReviewDone(false);
    setResumeData(s.resume||null);
    setScreen("quiz");
  },[]);

  const handleQuizDone=useCallback((h)=>{
    setHistory(h);
    const wrongs=h.filter(x=>!x.correct).map(x=>x.n);
    if(wrongs.length>0)setReviewQs(QS[unit].filter(q=>wrongs.includes(q.n)));
    setResumeData(null);
    setScreen("result");
  },[unit]);

  const handleReviewDone=useCallback(()=>{setReviewDone(true);setScreen("result");},[]);

  const handleExitToStart=useCallback(()=>{
    voice.cancel();
    setResumeData(null);
    setReviewQs([]);
    setReviewDone(false);
    setScreen("start");
  },[voice]);

  return React.createElement("div",{id:"quiz-wrap"},
    screen==="start"&&React.createElement(StartScreen,{onStart:handleStart,initialStudent:student,initialUnit:unit}),
    screen==="quiz"&&React.createElement(QuizScreen,{
      student,unit,isReview:false,questions:QS[unit],
      initialPos:resumeData?.pos||0,
      initialHistory:resumeData?.history||[],
      onFinish:handleQuizDone,onExit:handleExitToStart,voice
    }),
    screen==="review"&&React.createElement(QuizScreen,{
      student,unit,isReview:true,questions:reviewQs,
      initialPos:0,initialHistory:[],
      onFinish:handleReviewDone,onExit:handleExitToStart,voice
    }),
    screen==="result"&&React.createElement(ResultScreen,{student,unit,history,reviewDone,onRetry:()=>setScreen("start"),onReview:()=>setScreen("review")})
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));

</script>
